name: Branch Flow Guard

on:
  pull_request:
    types: [opened, reopened, synchronize, edited, ready_for_review]

permissions:
  contents: read

jobs:
  enforce-flow:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR branch flow
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail

          echo "Validating branch flow: ${HEAD_REF} -> ${BASE_REF}"

          if [[ "${HEAD_REF}" == feat/* || "${HEAD_REF}" == fix/* || "${HEAD_REF}" == chore/* || "${HEAD_REF}" == docs/* || "${HEAD_REF}" == refactor/* || "${HEAD_REF}" == hotfix/* ]] && [[ "${BASE_REF}" == "develop" ]]; then
            echo "Allowed: ${HEAD_REF} can merge into develop"
            exit 0
          fi

          if [[ "${HEAD_REF}" == release/* && ( "${BASE_REF}" == "main" || "${BASE_REF}" == "develop" ) ]]; then
            echo "Allowed: ${HEAD_REF} can merge into ${BASE_REF}"
            exit 0
          fi

          if [[ "${HEAD_REF}" == hotfix/* && ( "${BASE_REF}" == "main" || "${BASE_REF}" == "develop" ) ]]; then
            echo "Allowed: ${HEAD_REF} can merge into ${BASE_REF}"
            exit 0
          fi

          if [[ "${HEAD_REF}" == "develop" && "${BASE_REF}" == "main" ]]; then
            echo "Allowed: develop can merge into main (release promotion)"
            exit 0
          fi

          if [[ "${HEAD_REF}" == "main" && "${BASE_REF}" == "develop" ]]; then
            echo "Allowed: main can back-sync into develop"
            exit 0
          fi

          echo "Invalid branch flow: ${HEAD_REF} -> ${BASE_REF}"
          echo "Expected Gitflow: feature/fix/chore/* -> develop -> main"
          echo "Hotfixes: hotfix/* -> main + develop"
          echo "Releases: release/* -> main + develop"
          exit 1
