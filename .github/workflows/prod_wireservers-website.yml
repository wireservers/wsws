name: Build and deploy website to Azure (prod)

on:
  push:
    branches:
      - main
    paths:
      - 'wireservers'
      - 'wireservers/app/**'
      - '.github/workflows/prod_wireservers-website.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure private submodule auth
        env:
          SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
        run: |
          if [ -z "$SUBMODULES_TOKEN" ]; then
            echo "::error::SUBMODULES_TOKEN is not set — cannot clone private submodules"
            exit 1
          fi
          git config --global url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Checkout project submodule
        run: git submodule update --init --depth=1 wireservers

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Install dependencies
        run: npm ci
        working-directory: wireservers/app

      - name: Build web export
        run: npm run build
        working-directory: wireservers/app

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROD }}
          action: 'upload'
          app_location: 'wireservers/app/dist'
          skip_app_build: true
