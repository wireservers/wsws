name: Build and deploy Node.js app to Azure Web App - wsapi-dev

on:
  push:
    branches:
      - develop
    paths:
      - 'apis/wsapi'
      - 'apis/wsapi/**'
      - '.github/workflows/dev_wsapi.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apis/wsapi

    steps:
      - uses: actions/checkout@v4

      - name: Configure private submodule auth
        env:
          SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
        run: |
          if [ -z "$SUBMODULES_TOKEN" ]; then
            echo "::error::SUBMODULES_TOKEN is not set — cannot clone private submodules"
            exit 1
          fi
          git config --global url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf "https://github.com/"
        working-directory: ${{ github.workspace }}

      - name: Checkout project submodule
        run: git submodule update --init --depth=1 apis/wsapi
        working-directory: ${{ github.workspace }}

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Enable Corepack and activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            apis/wsapi
            !apis/wsapi/node_modules
            !apis/wsapi/.git
            !apis/wsapi/.env

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'wsapi-dev'
          slot-name: 'Production'
          package: .
