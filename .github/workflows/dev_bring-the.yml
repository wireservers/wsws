name: Build and deploy Expo web app to Azure Web App - bring-the-dev

on:
  push:
    branches:
      - develop
    paths:
      - 'bringthe/bring-the'
      - 'bringthe/bring-the/**'
      - '.github/workflows/dev_bring-the.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: bringthe/bring-the

    steps:
      - uses: actions/checkout@v4

      - name: Configure private submodule auth
        env:
          SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
        run: |
          if [ -n "$SUBMODULES_TOKEN" ]; then
            git config --global url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi
        working-directory: ${{ github.workspace }}

      - name: Checkout project submodule
        run: git submodule update --init --depth=1 bringthe/bring-the
        working-directory: ${{ github.workspace }}

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Install dependencies
        run: npm ci

      - name: Build web export
        run: npx expo export --platform web

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: bringthe/bring-the/dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: web-app
          path: site

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'bring-the-dev'
          slot-name: 'Production'
          package: ./site
          startup-command: 'pm2 serve /home/site/wwwroot --no-daemon --spa'
