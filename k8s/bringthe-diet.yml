apiVersion: apps/v1
kind: Deployment
metadata:
  name: bringthe-diet
  namespace: wireservers
  labels:
    app: bringthe-diet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bringthe-diet
  template:
    metadata:
      labels:
        app: bringthe-diet
    spec:
      containers:
        - name: bringthe-diet
          image: wsws/bringthe-diet:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://food-api:5000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: bringthe-diet
  namespace: wireservers
spec:
  selector:
    app: bringthe-diet
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
