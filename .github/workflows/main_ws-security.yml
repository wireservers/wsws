name: Build and deploy ASP.Net Core app to Azure Web App - ws-security

on:
  push:
    branches:
      - main
    paths:
      - 'ws-security'
      - 'ws-security/**'
      - '.github/workflows/main_ws-security.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ws-security

    steps:
      - uses: actions/checkout@v4

      - name: Configure private submodule auth
        env:
          SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
        run: |
          if [ -n "$SUBMODULES_TOKEN" ]; then
            git config --global url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi
        working-directory: ${{ github.workspace }}

      - name: Checkout project submodule
        run: git submodule update --init --depth=1 ws-security
        working-directory: ${{ github.workspace }}

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build api/SecurityApi.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish api/SecurityApi.csproj -c Release -o ${{ env.DOTNET_ROOT }}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.DOTNET_ROOT }}/myapp

  migrate:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ws-security

    steps:
      - uses: actions/checkout@v4

      - name: Configure private submodule auth
        env:
          SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
        run: |
          if [ -n "$SUBMODULES_TOKEN" ]; then
            git config --global url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi
        working-directory: ${{ github.workspace }}

      - name: Checkout project submodule
        run: git submodule update --init --depth=1 ws-security
        working-directory: ${{ github.workspace }}

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Login to Azure (migrations SP via OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_MIGRATE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_MIGRATE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Apply EF Core migrations
        env:
          ConnectionStrings__Default: 'Server=tcp:wireservers-prod.database.windows.net,1433;Initial Catalog=ws-security;Encrypt=True;TrustServerCertificate=False;Connection Timeout=60;Authentication="Active Directory Default";'
        run: |
          dotnet tool install --global dotnet-ef --version 10.*
          dotnet restore api/SecurityApi.csproj
          dotnet ef database update --project api/SecurityApi.csproj --configuration Release

  deploy:
    runs-on: ubuntu-latest
    needs: [build, migrate]
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0EA1D21C30104AE1B905589654CDB625 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_469F68358C6041D6A47DB03A77A039CC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DD405D0D3A9E4D60B95CAB25D0901DFA }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ws-security'
          slot-name: 'Production'
          package: .
