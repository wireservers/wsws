name: Build and deploy - wireservers-food-api-dev

on:
  push:
    branches:
      - develop
    paths:
      - 'apis/food-api'
      - 'apis/food-api/**'
      - '.github/workflows/develop_wireservers-food-api-dev.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apis/food-api

    steps:
      - uses: actions/checkout@v4

      - name: Configure private submodule auth
        env:
          SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
        run: |
          if [ -n "$SUBMODULES_TOKEN" ]; then
            git config --global url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi
        working-directory: ${{ github.workspace }}

      - name: Checkout project submodule
        run: git submodule update --init --depth=1 apis/food-api
        working-directory: ${{ github.workspace }}

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build BringTheDiet.Api.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish BringTheDiet.Api.csproj -c Release -o ${{ env.DOTNET_ROOT }}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.DOTNET_ROOT }}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_44EB82A5CC014AAE9E36591D673BC770 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4CCEE8B078FB41F58AC09876DC6777E5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_81B48C5F90E54B60972F2F5A665EC84F }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'wireservers-food-api-dev'
          slot-name: 'Production'
          package: .
