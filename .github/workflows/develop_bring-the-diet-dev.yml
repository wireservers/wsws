name: bring-the-diet-dev

on:
  push:
    branches:
      - develop
    paths:
      - 'bringthe/bring-the-diet'
      - 'bringthe/bring-the-diet/**'
      - '.github/workflows/develop_bring-the-diet-dev.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: bringthe/bring-the-diet

    steps:
      - uses: actions/checkout@v5

      - name: Configure private submodule auth
        env:
          SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
        run: |
          if [ -n "$SUBMODULES_TOKEN" ]; then
            git config --global url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi
        working-directory: ${{ github.workspace }}

      - name: Checkout project submodule
        run: git submodule update --init --depth=1 bringthe/bring-the-diet
        working-directory: ${{ github.workspace }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - name: Set up Node.js version
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          cache: 'pnpm'
          cache-dependency-path: bringthe/bring-the-diet/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Prepare standalone deployment
        run: |
          rm -rf ./deploy
          cp -rL web/.next/standalone ./deploy
          cp -rL web/.next/static ./deploy/web/.next/static
          [ -d web/public ] && cp -rL web/public ./deploy/web/public || true
          if [ -f ./deploy/package.json ]; then
            node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('./deploy/package.json','utf8')); delete p.scripts; delete p.packageManager; fs.writeFileSync('./deploy/package.json', JSON.stringify(p,null,2));"
          fi

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: bringthe/bring-the-diet/deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BAE7EB016C7A4845BC33EE6ED59C3021 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EA8FE2C778654AB997A55312F42DF455 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8129FDE953E043F49AF8F71A4507A761 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'bring-the-diet-dev'
          slot-name: 'Production'
          package: .
          startup-command: 'node web/server.js'
