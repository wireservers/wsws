name: Build and deploy - reactnatives

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'packages/react-natives'
      - 'packages/react-natives/site/**'
      - '.github/workflows/prod_reactnatives.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure private submodule auth
        env:
          SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
        run: |
          if [ -z "$SUBMODULES_TOKEN" ]; then
            echo "::error::SUBMODULES_TOKEN is not set — cannot clone private submodules"
            exit 1
          fi
          git config --global url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Checkout project submodule
        run: git submodule update --init --depth=1 packages/react-natives

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Enable Corepack and activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: packages/react-natives/site

      - name: Build
        run: pnpm run build
        working-directory: packages/react-natives/site

      - name: Prepare deployment package
        run: |
          mkdir -p packages/react-natives/site/deploy
          cp -R packages/react-natives/site/dist/. packages/react-natives/site/deploy/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: packages/react-natives/site/deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: site

      - name: Ensure prod branch context
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "This workflow must run from refs/heads/main. Current ref: ${GITHUB_REF}"
            exit 1
          fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_AFC0F8E848174D5FA3F0BDC87D409ABF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B7167CDA5ADB47B4A1D4310175CC80EA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7FC94A80301242DCB253C13DDD8C881F }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'reactnatives'
          slot-name: 'Production'
          package: ./site
          startup-command: 'pm2 serve /home/site/wwwroot --no-daemon --spa'
