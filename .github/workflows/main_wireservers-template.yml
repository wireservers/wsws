name: Build and deploy Node.js app to Azure Web App - wireservers-template

on:
  push:
    branches:
      - main
    paths:
      - 'wireservers-template/**'
      - '.github/workflows/main_wireservers-template.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: wireservers-template

    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.28.0

      - name: Set up Node.js version
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          cache: 'pnpm'
          cache-dependency-path: wireservers-template/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Prepare standalone deployment
        run: |
          rm -rf ./deploy
          cp -rL web/.next/standalone ./deploy
          cp -rL web/.next/static ./deploy/web/.next/static
          [ -d web/public ] && cp -rL web/public ./deploy/web/public || true
          if [ -f ./deploy/package.json ]; then
            node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('./deploy/package.json','utf8')); delete p.scripts; delete p.packageManager; fs.writeFileSync('./deploy/package.json', JSON.stringify(p,null,2));"
          fi

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: wireservers-template/deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_WIRESERVERS_TEMPLATE }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_WIRESERVERS_TEMPLATE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_WIRESERVERS_TEMPLATE }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'wireservers-template'
          slot-name: 'Production'
          package: .
          startup-command: 'node web/server.js'
